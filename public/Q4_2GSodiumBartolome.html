<!DOCTYPE html> 
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Add / Update Movie</title>

<style>
body{
    font-family: Arial;
    background:#f2f2f2;
}

.container{
    width:400px;
    margin:40px auto;
    background:white;
    padding:25px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

h2{
    text-align:center;
}

input, select{
    width:100%;
    padding:8px;
    margin-top:5px;
    margin-bottom:15px;
}

button{
    width:100%;
    padding:10px;
    background:#1976d2;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#125ca1;
}

.star{
    font-size:22px;
    cursor:pointer;
    color:lightgray;
}

.star.active{
    color:gold;
}

.movie{
    background:#f5f5f5;
    padding:10px;
    border-radius:5px;
    margin-top:10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.movie-stars{
    color:gold;
}

.delete-btn{
    background:red;
    color:white;
    border:none;
    padding:5px 8px;
    border-radius:5px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<h2>Add / Update a Movie</h2>

<label>Title:</label>
<input type="text" id="title">

<label>Year:</label>
<input type="number" id="year">

<label>Genre:</label>
<select id="genre">
<option>Action</option>
<option>Comedy</option>
<option>Drama</option>
<option>Horror</option>
<option>Sci-Fi</option>
</select>

<label>Rating:</label>

<div id="stars">
<span class="star" data-value="1">★</span>
<span class="star" data-value="2">★</span>
<span class="star" data-value="3">★</span>
<span class="star" data-value="4">★</span>
<span class="star" data-value="5">★</span>
</div>

<br>

<button onclick="addMovie()">Add Movie</button>

<h2>Movie List</h2>

<div id="movieList"></div>

</div>

<script>

let rating = 0

const stars = document.querySelectorAll(".star")

stars.forEach(star => {
    star.addEventListener("click", function(){
        rating = Number(this.dataset.value)

        stars.forEach(s => s.classList.remove("active"))

        for(let i=0;i<rating;i++){
            stars[i].classList.add("active")
        }
    })
})

function addMovie(){

const title = document.getElementById("title").value.trim()
const year = document.getElementById("year").value
const genre = document.getElementById("genre").value

if(!title || rating === 0){
    alert("Please enter title and rating")
    return
}

let movies = JSON.parse(localStorage.getItem("movies")) || []

// 🔹 CHECK IF MOVIE EXISTS
let existing = movies.find(m => m.title.toLowerCase() === title.toLowerCase())

if(existing){
    // 🔹 UPDATE + AVERAGE RATING
    existing.year = year
    existing.genre = genre
    existing.rating = Math.round((existing.rating + rating) / 2)
}else{
    movies.push({
        title:title,
        year:year,
        genre:genre,
        rating:rating
    })
}

localStorage.setItem("movies",JSON.stringify(movies))

displayMovies()

// reset
document.getElementById("title").value=""
document.getElementById("year").value=""
rating=0
stars.forEach(s=>s.classList.remove("active"))

}


function deleteMovie(index){

let confirmDelete = confirm("Are you sure you want to delete?")

if(!confirmDelete) return

let movies = JSON.parse(localStorage.getItem("movies")) || []

movies.splice(index,1)

localStorage.setItem("movies",JSON.stringify(movies))

displayMovies()

}


function displayMovies(){

let movies = JSON.parse(localStorage.getItem("movies")) || []

const list = document.getElementById("movieList")

list.innerHTML=""

movies.forEach((movie,index) => {

let starDisplay = ""

for(let i=0;i<movie.rating;i++){
starDisplay += "★"
}

const div = document.createElement("div")
div.className="movie"

div.innerHTML = `
<div>
${movie.title} (${movie.year}) - ${movie.genre}, Rating:
<span class="movie-stars">${starDisplay}</span>
</div>
<button class="delete-btn" onclick="deleteMovie(${index})">Delete</button>
`

list.appendChild(div)

})

}

displayMovies()

</script>

</body>
</html>
